name: Lavel CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  frontend-ci:
    name: CI / Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm test --if-present

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Save frontend artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  backend-ci:
    name: CI / Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest ruff

      - name: Run Ruff
        working-directory: backend
        run: python -m ruff check .

      - name: Run Pytest
        working-directory: backend
        run: python -m pytest -q

  backend-image:
    name: Build / Backend image
    if: github.event_name != 'pull_request'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA"
          LATEST_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" -t "$LATEST_IMAGE" backend
          docker push "$IMAGE_URI"
          docker push "$LATEST_IMAGE"

  # Deploy artifact đã build sẵn; không cài npm hoặc build frontend lần thứ hai.
  deploy-frontend:
    name: Deploy / Frontend to S3
    if: github.event_name != 'pull_request'
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    environment: production
    env:
      FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload website to S3
        run: |
          test -n "$FRONTEND_S3_BUCKET"
          aws s3 sync frontend-dist "s3://$FRONTEND_S3_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp frontend-dist/index.html "s3://$FRONTEND_S3_BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"

  # Server dùng IAM Role để đăng nhập ECR, pull đúng tag commit và thay container cũ
  deploy-backend:
    name: Deploy / Backend server
    if: github.event_name != 'pull_request'
    needs: backend-image
    runs-on: ubuntu-latest
    environment: production
    env:
      BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
      BACKEND_USER: ${{ secrets.BACKEND_USER }}
    steps:
      - name: Configure SSH
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
          BACKEND_SSH_KEY: ${{ secrets.BACKEND_SSH_KEY }}
        run: |
          test -n "$BACKEND_HOST"
          test -n "$BACKEND_USER"
          test -n "$BACKEND_ENV_FILE"
          test -n "$BACKEND_SSH_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$BACKEND_SSH_KEY" > ~/.ssh/lavel_deploy_key
          chmod 600 ~/.ssh/lavel_deploy_key
          ssh-keyscan -H "$BACKEND_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
          printf '%s\n' "$BACKEND_ENV_FILE" > /tmp/lavel_backend.env
          chmod 600 /tmp/lavel_backend.env
          scp -i ~/.ssh/lavel_deploy_key /tmp/lavel_backend.env "$BACKEND_USER@$BACKEND_HOST:~/lavel_backend.env"
          rm -f /tmp/lavel_backend.env

      - name: Pull image and replace container
        run: |
          ssh -i ~/.ssh/lavel_deploy_key "$BACKEND_USER@$BACKEND_HOST" \
            "AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker pull "$IMAGE_URI"

          chmod 600 "$HOME/lavel_backend.env"
          docker rm -f lavel-backend 2>/dev/null || true
          docker run -d \
            --name lavel-backend \
            --restart unless-stopped \
            --env-file "$HOME/lavel_backend.env" \
            -p 8000:8000 \
            -v lavel_uploads:/app/uploads \
            "$IMAGE_URI"

          for attempt in $(seq 1 15); do
            if curl --fail --silent http://127.0.0.1:8000/ >/dev/null; then
              docker image prune -f
              exit 0
            fi
            sleep 2
          done

          docker logs lavel-backend
          exit 1
          REMOTE
