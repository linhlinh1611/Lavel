name: Lavel CD

on:
  workflow_run:
    workflows: ["Lavel CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}

jobs:
  # Stage 1A: Deploy frontend từ artifact của CI lên S3
  deploy-frontend:
    name: Stage 1A / Deploy frontend
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        env:
          FRONTEND_S3_BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: aws s3 sync frontend-dist "s3://$FRONTEND_S3_BUCKET" --delete

  # Stage 1B: Build và push backend image (chạy song song với frontend)
  build-backend:
    name: Stage 1B / Build backend image
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"

  # Stage 2: Chỉ deploy backend sau khi image đã push thành công
  deploy-backend:
    name: Stage 2 / Deploy backend
    needs: build-backend
    runs-on: ubuntu-latest
    environment: production
    env:
      BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
      BACKEND_USER: ${{ secrets.BACKEND_USER }}
    steps:
      - name: Configure SSH and environment
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
          BACKEND_SSH_KEY: ${{ secrets.BACKEND_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$BACKEND_SSH_KEY" > ~/.ssh/lavel_deploy_key
          chmod 600 ~/.ssh/lavel_deploy_key
          ssh-keyscan -H "$BACKEND_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$BACKEND_ENV_FILE" > /tmp/lavel_backend.env
          chmod 600 /tmp/lavel_backend.env
          scp -i ~/.ssh/lavel_deploy_key /tmp/lavel_backend.env "$BACKEND_USER@$BACKEND_HOST:~/lavel_backend.env"
          rm -f /tmp/lavel_backend.env

      - name: Pull image and run container
        run: |
          ssh -i ~/.ssh/lavel_deploy_key "$BACKEND_USER@$BACKEND_HOST" \
            "AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' bash -s" <<'REMOTE'
          set -e
          AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"
          docker pull "$IMAGE_URI"
          chmod 600 "$HOME/lavel_backend.env"
          docker rm -f lavel-backend 2>/dev/null || true
          docker run -d \
            --name lavel-backend \
            --restart unless-stopped \
            --env-file "$HOME/lavel_backend.env" \
            -p 8000:8000 \
            -v lavel_uploads:/app/uploads \
            "$IMAGE_URI"
          REMOTE
